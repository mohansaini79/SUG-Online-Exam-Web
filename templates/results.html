<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Results – ExamPro</title>
<script src="/static/js/toast.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{font-family:'Inter',sans-serif;}
  body{background:#020208;}
  .glass{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);}
  .glass2{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.10);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.4);border-radius:4px;}
  .pass-badge{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.35);color:#34d399;}
  .fail-badge{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);color:#f87171;}
  .rank-gold{background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.35);color:#fbbf24;}
  .rank-silver{background:rgba(156,163,175,0.15);border:1px solid rgba(156,163,175,0.35);color:#9ca3af;}
  .rank-bronze{background:rgba(180,83,9,0.15);border:1px solid rgba(180,83,9,0.35);color:#d97706;}
  .result-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:all 0.3s;border-radius:16px;}
  .result-card:hover{border-color:rgba(139,92,246,0.3);box-shadow:0 8px 32px rgba(139,92,246,0.1);}
</style>
</head>
<body class="min-h-screen text-gray-100">

<!-- ══ TOP BANNER ══ -->
<div class="w-full border-b border-red-900/40"
  style="background:linear-gradient(135deg,rgba(4,30,66,0.98),rgba(60,10,10,0.95));">
  <div class="max-w-full px-4 py-2 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl overflow-hidden bg-white flex items-center justify-center border border-red-600/30 flex-shrink-0">
        <img src="/static/images/logo.png"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
          alt="Logo" class="w-full h-full object-contain p-1"/>
        <div class="hidden w-full h-full items-center justify-center bg-gradient-to-br from-blue-900 to-red-800">
          <span class="text-white font-black text-sm">SU</span>
        </div>
      </div>
      <div>
        <p class="text-white font-black text-xs sm:text-sm leading-tight">SHOBHIT UNIVERSITY, GANGOH</p>
        <p class="text-red-300 text-[10px] tracking-wider font-medium">Dept. of Computer Science & Technology</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span class="hidden md:flex items-center gap-1 text-[10px] text-gray-400">
        <i class="fas fa-graduation-cap text-blue-400"></i> ExamPro v2.0
      </span>
      <a href="/student/dashboard"
        class="px-3 py-1.5 rounded-xl text-xs font-semibold border border-purple-500/30 text-purple-300 bg-purple-500/10 hover:bg-purple-500/20 transition-all flex items-center gap-1.5">
        <i class="fas fa-arrow-left"></i> Dashboard
      </a>
    </div>
  </div>
  <div class="h-0.5 bg-gradient-to-r from-transparent via-red-600 to-transparent opacity-50"></div>
</div>

<div class="max-w-5xl mx-auto px-4 py-6">

  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-500 to-orange-600 flex items-center justify-center">
        <i class="fas fa-trophy text-white text-sm"></i>
      </div>
      <div>
        <h1 class="text-xl font-black text-white">My Results</h1>
        <p class="text-gray-500 text-xs" id="result-subtitle">Loading…</p>
      </div>
    </div>
  </div>

  <!-- KPI row -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="kpi-row" style="display:none!important;">
    <div class="glass rounded-2xl p-4 text-center">
      <p class="text-2xl font-black text-white" id="kpi-total">—</p>
      <p class="text-xs text-gray-500 mt-1">Total Exams</p>
    </div>
    <div class="glass rounded-2xl p-4 text-center">
      <p class="text-2xl font-black text-emerald-400" id="kpi-passed">—</p>
      <p class="text-xs text-gray-500 mt-1">Passed</p>
    </div>
    <div class="glass rounded-2xl p-4 text-center">
      <p class="text-2xl font-black text-red-400" id="kpi-failed">—</p>
      <p class="text-xs text-gray-500 mt-1">Failed</p>
    </div>
    <div class="glass rounded-2xl p-4 text-center">
      <p class="text-2xl font-black text-purple-400" id="kpi-avg">—</p>
      <p class="text-xs text-gray-500 mt-1">Avg Score</p>
    </div>
  </div>

  <!-- Results list -->
  <div id="results-container">
    <div class="glass rounded-2xl p-12 text-center text-gray-500">
      <i class="fas fa-spinner fa-spin text-3xl mb-3 block text-purple-400"></i>
      <p>Loading results…</p>
    </div>
  </div>

</div>

<script src="/static/js/app.js"></script>
<script>
async function init() {
  const me = await getMe();
  if (!me) return;

  const {ok, data} = await apiGet('/api/results');
  if (!ok || !data || !data.length) {
    document.getElementById('result-subtitle').textContent =
      'No results published yet';
    document.getElementById('results-container').innerHTML = `
      <div class="glass rounded-2xl p-12 text-center text-gray-500">
        <i class="fas fa-inbox text-4xl mb-3 block text-gray-600"></i>
        <p class="font-medium text-sm">No results yet</p>
        <p class="text-xs mt-1 text-gray-600">Results will appear after faculty publishes them</p>
      </div>`;
    return;
  }

  // KPI
  const total  = data.length;
  const passed = data.filter(r => r.pass).length;
  const failed = total - passed;
  const avg    = total
    ? Math.round(data.reduce((s,r) => s + (r.total||0), 0) / total)
    : 0;

  document.getElementById('kpi-total').textContent  = total;
  document.getElementById('kpi-passed').textContent = passed;
  document.getElementById('kpi-failed').textContent = failed;
  document.getElementById('kpi-avg').textContent    = avg;
  document.getElementById('kpi-row').style.display  = '';
  document.getElementById('result-subtitle').textContent =
    `${total} exam result${total>1?'s':''} published`;

  // Render cards
  document.getElementById('results-container').innerHTML =
    data.map(r => buildResultCard(r, me)).join('');
}

function buildResultCard(r, me) {
  // ★ exam_title use karo — exam_id fallback ★
  const examName = r.exam_title || r.exam_id || 'Exam';
  const subject  = r.exam_subject || '';
  const total    = r.total        || 0;
  const maxMarks = r.total_marks  || 100;
  const pass     = r.pass;
  const rank     = r.rank         || '—';
  const pct      = r.percentile   || 0;
  const pub      = r.published_at
    ? new Date(r.published_at).toLocaleDateString('en-IN',
        {day:'2-digit',month:'short',year:'numeric'})
    : '';

  const pct_score = maxMarks
    ? Math.round((total / maxMarks) * 100) : 0;
  const bar_w = Math.min(100, pct_score);

  // rank badge
  const rankBadge = rank === 1
    ? `<span class="rank-gold text-xs px-2.5 py-0.5 rounded-full font-bold">#1 🥇</span>`
    : rank === 2
    ? `<span class="rank-silver text-xs px-2.5 py-0.5 rounded-full font-bold">#2 🥈</span>`
    : rank === 3
    ? `<span class="rank-bronze text-xs px-2.5 py-0.5 rounded-full font-bold">#3 🥉</span>`
    : `<span class="text-xs bg-gray-700/50 text-gray-400 border border-gray-600/30 px-2.5 py-0.5 rounded-full font-bold">Rank #${rank}</span>`;

  // score bar color
  const barColor = pct_score >= 75 ? '#10b981'
                 : pct_score >= 50 ? '#f59e0b'
                 :                   '#ef4444';

  return `
    <div class="result-card p-5 mb-3">
      <div class="flex flex-col sm:flex-row sm:items-center gap-4">

        <!-- Score circle -->
        <div style="
          width:72px;height:72px;border-radius:50%;
          background:conic-gradient(${barColor} ${bar_w*3.6}deg,rgba(255,255,255,0.05) 0deg);
          display:flex;align-items:center;justify-content:center;
          flex-shrink:0;position:relative;">
          <div style="
            width:56px;height:56px;border-radius:50%;
            background:#020208;
            display:flex;align-items:center;
            justify-content:center;flex-direction:column;">
            <span style="color:white;font-weight:900;font-size:15px;line-height:1;">${total}</span>
            <span style="color:#6b7280;font-size:9px;">/${maxMarks}</span>
          </div>
        </div>

        <!-- Info -->
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-2 mb-1">
            <!-- ★ EXAM TITLE ★ -->
            <h3 class="text-white font-bold text-sm">${esc(examName)}</h3>
            <span class="font-mono text-xs bg-gray-800 text-gray-500 px-2 py-0.5 rounded-lg">${r.exam_id||''}</span>
            <span class="text-xs px-2.5 py-0.5 rounded-full font-semibold ${pass?'pass-badge':'fail-badge'}">
              ${pass?'✓ PASS':'✗ FAIL'}
            </span>
          </div>

          ${subject?`<p class="text-gray-500 text-xs mb-2"><i class="fas fa-book mr-1"></i>${esc(subject)}</p>`:''}

          <!-- Score bar -->
          <div class="mb-2">
            <div class="flex justify-between text-xs mb-1">
              <span class="text-gray-500">Score</span>
              <span style="color:${barColor};font-weight:700;">${pct_score}%</span>
            </div>
            <div class="w-full h-1.5 rounded-full bg-white/5">
              <div class="h-1.5 rounded-full transition-all"
                style="width:${bar_w}%;background:${barColor};"></div>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            ${rankBadge}
            <span class="text-xs text-gray-500">
              <i class="fas fa-percentage mr-1 text-purple-400"></i>${pct}th percentile
            </span>
            ${pub?`<span class="text-xs text-gray-600"><i class="fas fa-calendar mr-1"></i>${pub}</span>`:''}
          </div>
        </div>

        <!-- Actions -->
        <div class="flex flex-col gap-2 flex-shrink-0">
          <a href="/ranking/${r.exam_id}"
            class="px-4 py-2 rounded-xl text-xs font-semibold border border-purple-500/30 text-purple-300 bg-purple-500/10 hover:bg-purple-500/20 transition-all flex items-center gap-1.5 justify-center">
            <i class="fas fa-list-ol"></i> Ranking
          </a>
          <a href="/results/${r.exam_id}"
            class="px-4 py-2 rounded-xl text-xs font-semibold border border-indigo-500/30 text-indigo-300 bg-indigo-500/10 hover:bg-indigo-500/20 transition-all flex items-center gap-1.5 justify-center">
            <i class="fas fa-users"></i> All Results
          </a>
        </div>

      </div>
    </div>`;
}

function esc(str) {
  if(str==null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>
</body>
</html>
