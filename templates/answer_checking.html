<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Answer Checking – ExamPro</title>
<script src="/static/js/toast.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{font-family:'Inter',sans-serif;}
  body{background:#0a0a0f;}
  .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);}
  .glass2{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.10);}
  .input-field{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:white;}
  .input-field:focus{outline:none;border-color:#818cf8;}
  .student-item{transition:all 0.15s;cursor:pointer;}
  .student-item:hover{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3)!important;}
  .student-active{background:rgba(99,102,241,0.25)!important;border-color:#6366f1!important;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.4);border-radius:4px;}
  .ai-score-ring{
    background:conic-gradient(#a78bfa var(--pct),rgba(255,255,255,0.05) 0deg);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  @keyframes aiPulse{0%,100%{box-shadow:0 0 0 0 rgba(139,92,246,0.4);}50%{box-shadow:0 0 0 10px rgba(139,92,246,0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes dotB{0%,100%{transform:translateY(0);opacity:.3;}50%{transform:translateY(-6px);opacity:1;}}
</style>
</head>
<body class="min-h-screen text-gray-100">

<!-- ══ NAVBAR ══ -->
<nav class="border-b border-gray-800 px-6 py-3 flex items-center gap-3 sticky top-0 z-50 backdrop-blur-md"
  style="background:rgba(10,10,15,0.95)">
  <a href="/faculty/dashboard"
    class="w-8 h-8 flex items-center justify-center rounded-lg bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-white transition-all">
    <i class="fas fa-arrow-left text-sm"></i>
  </a>
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 bg-indigo-600/30 rounded-lg flex items-center justify-center">
      <i class="fas fa-pen-alt text-indigo-400 text-sm"></i>
    </div>
    <h1 class="text-white font-bold text-sm sm:text-base">Answer Checking</h1>
  </div>
  <span class="text-xs bg-indigo-900/50 text-indigo-300 px-2.5 py-1 rounded-full font-mono border border-indigo-700/40">
    {{ exam_id }}
  </span>

  <!-- AI Grade All button -->
  <div class="ml-auto flex items-center gap-2">
    <span style="background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.35);color:#c4b5fd;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;">
      ✦ LLaMA 3.1 8B
    </span>
    <button onclick="refreshAll()"
      class="text-xs text-gray-400 hover:text-white transition-colors flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-gray-700/40 hover:border-gray-600">
      <i class="fas fa-sync-alt"></i> Refresh
    </button>
  </div>
</nav>

<!-- ══ LAYOUT ══ -->
<div class="flex h-[calc(100vh-57px)]">

  <!-- LEFT: Student list -->
  <div class="w-72 flex-shrink-0 border-r border-gray-800 flex flex-col"
    style="background:rgba(10,10,15,0.7)">

    <!-- Search -->
    <div class="p-4 border-b border-gray-800">
      <div class="relative">
        <i class="fas fa-search absolute left-3 top-2.5 text-gray-500 text-xs"></i>
        <input id="search-input" type="text" placeholder="Search students…"
          oninput="filterStudents(this.value)"
          class="w-full bg-gray-800/60 border border-gray-700 rounded-xl pl-8 pr-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500"/>
      </div>
      <div class="flex items-center justify-between mt-2">
        <span class="text-xs text-gray-500">Submissions</span>
        <span id="sub-count" class="text-xs bg-indigo-900/50 text-indigo-300 px-2 py-0.5 rounded-full border border-indigo-700/40 font-bold">0</span>
      </div>
    </div>

    <!-- Student list -->
    <div id="student-list" class="flex-1 overflow-y-auto p-3 space-y-1.5">
      <div class="text-center py-10 text-gray-500 text-sm">
        <i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i>Loading…
      </div>
    </div>
  </div>

  <!-- RIGHT: Answer panel -->
  <div class="flex-1 overflow-y-auto p-5">
    <div id="answer-panel">
      <div class="flex items-center justify-center h-full min-h-[60vh]">
        <div class="text-center text-gray-500">
          <div class="w-20 h-20 bg-gray-800/60 rounded-3xl flex items-center justify-center mx-auto mb-5">
            <i class="fas fa-hand-pointer text-3xl text-gray-600"></i>
          </div>
          <p class="text-lg font-medium text-gray-400">Select a student</p>
          <p class="text-sm mt-1 text-gray-600">Click a name from the left panel to review their answers</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ AI GRADING LOADER ══ -->
<div id="ai-grading-loader" class="hidden fixed inset-0 z-[99999] flex items-center justify-center"
  style="background:rgba(2,2,12,0.9);backdrop-filter:blur(8px);">
  <div style="background:rgba(10,10,35,0.99);border:1px solid rgba(139,92,246,0.4);border-radius:24px;padding:44px 52px;text-align:center;max-width:360px;width:90%;box-shadow:0 32px 80px rgba(0,0,0,0.7);">
    <div style="position:relative;width:80px;height:80px;margin:0 auto 24px;">
      <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(139,92,246,0.15);"></div>
      <div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#a78bfa;animation:spin 1s linear infinite;"></div>
      <div style="position:absolute;inset:10px;border-radius:50%;background:rgba(139,92,246,0.1);display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-robot" style="font-size:22px;color:#a78bfa;"></i>
      </div>
    </div>
    <p style="color:white;font-size:17px;font-weight:800;margin-bottom:4px;">AI Grading</p>
    <p id="ai-loader-name" style="color:#a78bfa;font-size:13px;font-weight:600;margin-bottom:4px;">—</p>
    <p style="color:#9ca3af;font-size:12px;margin-bottom:20px;line-height:1.6;">
      Evaluating subjective answers…<br/>Generating feedback…
    </p>
    <div style="display:flex;justify-content:center;gap:6px;">
      <span style="width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:dotB 1.2s ease-in-out infinite;"></span>
      <span style="width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:dotB 1.2s ease-in-out infinite;animation-delay:.2s;"></span>
      <span style="width:7px;height:7px;border-radius:50%;background:#a78bfa;animation:dotB 1.2s ease-in-out infinite;animation-delay:.4s;"></span>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script>
const EXAM_ID    = '{{ exam_id }}';
let allQuestions = [];
let allSubs      = [];
let currentUid   = null;
let currentName  = '';
let aiResultsCache = {};

// ── INIT ──────────────────────────────────────────────────
async function init() {
  await refreshAll();
}

async function refreshAll() {
  const [qRes, sRes] = await Promise.all([
    apiGet(`/api/exams/${EXAM_ID}/questions`),
    apiGet(`/api/exams/${EXAM_ID}/submissions`)
  ]);
  allQuestions = qRes.data || [];
  allSubs      = sRes.data || [];
  renderStudentList(allSubs);
  if (currentUid) {
    const sub = allSubs.find(s => s.user_id === currentUid);
    if (sub) await selectStudent(
      currentUid, sub.student_name, sub.roll_number);
  }
}

// ── STUDENT LIST ──────────────────────────────────────────
function renderStudentList(subs) {
  document.getElementById('sub-count').textContent = subs.length;
  const el = document.getElementById('student-list');
  if (!subs.length) {
    el.innerHTML = `
      <div class="text-center py-10 text-gray-500 text-sm">
        <i class="fas fa-inbox text-2xl mb-2 block text-gray-600"></i>
        No submissions yet.
      </div>`;
    return;
  }
  el.innerHTML = subs.map(s => `
    <button onclick="selectStudent('${esc(s.user_id)}','${esc(s.student_name)}','${esc(s.roll_number)}')"
      id="btn-${s.user_id}"
      class="student-item w-full text-left px-3 py-2.5 rounded-xl border border-gray-700/40">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-indigo-600/20 border border-indigo-600/20 flex items-center justify-center flex-shrink-0">
          <i class="fas fa-user text-indigo-400 text-xs"></i>
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-white text-sm font-medium truncate">${esc(s.student_name)||'Unknown'}</p>
          <p class="text-gray-400 text-xs">${esc(s.roll_number)||s.user_id.slice(-8)}</p>
        </div>
        <i id="ai-badge-${s.user_id}" class="fas fa-robot text-xs text-gray-600 flex-shrink-0"
          title="AI graded" style="display:none;color:#a78bfa;"></i>
        <i class="fas fa-chevron-right text-gray-600 text-xs flex-shrink-0"></i>
      </div>
    </button>`).join('');
}

function filterStudents(query) {
  const q = query.toLowerCase();
  renderStudentList(allSubs.filter(s =>
    (s.student_name||'').toLowerCase().includes(q) ||
    (s.roll_number||'').toLowerCase().includes(q)
  ));
}

// ── SELECT STUDENT ────────────────────────────────────────
async function selectStudent(uid, name, roll) {
  document.querySelectorAll('.student-item')
    .forEach(b => b.classList.remove('student-active'));
  document.getElementById(`btn-${uid}`)
    ?.classList.add('student-active');
  currentUid  = uid;
  currentName = name || 'Student';

  const [marksRes, aiRes] = await Promise.all([
    apiGet(`/api/exams/${EXAM_ID}/marks/${uid}`),
    apiGet(`/api/exams/${EXAM_ID}/ai-results/${uid}`)
  ]);

  const marks   = marksRes.data || {};
  const aiData  = aiRes.ok ? aiRes.data : null;
  if (aiData?.graded) aiResultsCache[uid] = aiData;

  const sub     = allSubs.find(s => s.user_id === uid);
  const answers = sub?.answers || {};

  renderAnswerPanel(uid, name, roll, marks, answers, aiData);
}

// ── RENDER ANSWER PANEL ───────────────────────────────────
function renderAnswerPanel(uid, name, roll, marks, answers, aiData) {
  const answeredCount = Object.values(answers)
    .filter(v => v && v !== '').length;
  const autoMarks   = marks?.auto_marks   ?? 0;
  const manualMarks = marks?.manual_marks ?? 0;
  const aiMarks     = aiData?.ai_subjective_marks ?? marks?.ai_subjective_marks ?? 0;

  const hasAI = aiData?.graded;

  document.getElementById('answer-panel').innerHTML = `
    <!-- ★ STUDENT HEADER ★ -->
    <div class="glass rounded-2xl p-5 mb-4">
      <div class="flex flex-col lg:flex-row lg:items-start gap-4">

        <!-- Info -->
        <div class="flex items-center gap-3 flex-1">
          <div class="w-12 h-12 bg-indigo-600/20 rounded-2xl flex items-center justify-center flex-shrink-0">
            <i class="fas fa-user-graduate text-indigo-400 text-xl"></i>
          </div>
          <div>
            <h2 class="text-lg font-bold text-white">${esc(name)||'Unknown'}</h2>
            <div class="flex flex-wrap items-center gap-3 mt-1 text-xs text-gray-400">
              <span><i class="fas fa-id-card mr-1"></i>${esc(roll)||'—'}</span>
              <span class="text-emerald-400">
                <i class="fas fa-check-circle mr-1"></i>MCQ Auto: <strong>${autoMarks}</strong>
              </span>
              <span class="text-indigo-400">
                <i class="fas fa-pen mr-1"></i>Manual: <strong id="manual-display">${manualMarks}</strong>
              </span>
              ${hasAI ? `
              <span class="text-purple-400">
                <i class="fas fa-robot mr-1"></i>AI Subjective: <strong>${aiMarks}</strong>
              </span>` : ''}
            </div>
          </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap items-end gap-3 flex-shrink-0">

          <!-- ★ AI GRADE BUTTON ★ -->
          <div>
            <label class="text-xs text-gray-400 block mb-1.5 uppercase tracking-wide">AI Grading</label>
            <button onclick="runAIGrading()"
              id="ai-grade-btn"
              class="px-4 py-2.5 rounded-xl text-sm font-bold text-white flex items-center gap-2 transition-all"
              style="background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 15px rgba(139,92,246,0.3);">
              <i id="ai-btn-icon" class="fas fa-robot"></i>
              <span id="ai-btn-text">
                ${hasAI ? 'Re-Grade with AI' : 'Grade with AI'}
              </span>
            </button>
          </div>

          <!-- Manual marks -->
          <div>
            <label class="text-xs text-gray-400 block mb-1.5 uppercase tracking-wide">Manual Marks</label>
            <div class="flex gap-2">
              <input type="number" id="manual-marks"
                value="${manualMarks}" min="0"
                class="w-24 bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500"/>
              <button onclick="saveMarks()"
                class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-sm font-semibold transition-all flex items-center gap-2">
                <i class="fas fa-save"></i> Save
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Remarks -->
      <div class="mt-4 pt-4 border-t border-gray-700/50">
        <label class="text-xs text-gray-400 uppercase tracking-wide mb-1.5 block">
          <i class="fas fa-comment-alt mr-1"></i>Remarks
        </label>
        <textarea id="remarks" rows="2"
          placeholder="Add remarks or feedback…"
          class="w-full bg-gray-800/60 border border-gray-700 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 resize-none">${esc(marks?.remarks||'')}</textarea>
      </div>
    </div>

    <!-- ★ AI RESULT SUMMARY (show if graded) ★ -->
    <div id="ai-summary" class="${hasAI ? '' : 'hidden'} mb-4">
      ${hasAI ? buildAISummary(aiData) : ''}
    </div>

    <!-- Stats bar -->
    <div class="grid grid-cols-4 gap-3 mb-4">
      <div class="glass rounded-xl p-3 text-center">
        <p class="text-xs text-gray-400 mb-1">Questions</p>
        <p class="text-xl font-bold text-white">${allQuestions.length}</p>
      </div>
      <div class="glass rounded-xl p-3 text-center">
        <p class="text-xs text-gray-400 mb-1">Answered</p>
        <p class="text-xl font-bold text-yellow-400">${answeredCount}</p>
      </div>
      <div class="glass rounded-xl p-3 text-center">
        <p class="text-xs text-gray-400 mb-1">Skipped</p>
        <p class="text-xl font-bold text-red-400">${allQuestions.length - answeredCount}</p>
      </div>
      <div class="glass rounded-xl p-3 text-center">
        <p class="text-xs text-gray-400 mb-1">AI Score</p>
        <p class="text-xl font-bold text-purple-400">${hasAI ? aiMarks : '—'}</p>
      </div>
    </div>

    <!-- Q&A List -->
    <div class="space-y-4" id="qa-list"></div>
  `;

  renderQAList(answers, aiData);
}

// ── BUILD AI SUMMARY BOX ──────────────────────────────────
function buildAISummary(aiData) {
  if (!aiData?.results?.length) return '';
  const results   = aiData.results;
  const totalAI   = aiData.ai_subjective_marks || 0;
  const totalPoss = results.reduce((s,r) => s + (r.marks||0), 0);
  const pct       = totalPoss
    ? Math.round((totalAI / totalPoss) * 100) : 0;
  const graded_at = aiData.ai_graded_at
    ? new Date(aiData.ai_graded_at).toLocaleString() : '—';
  const model     = aiData.ai_model || 'groq/llama-3.1-8b-instant';

  return `
    <div style="background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.3);border-radius:16px;padding:16px 20px;">
      <div class="flex flex-wrap items-center gap-3 mb-3">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:32px;height:32px;border-radius:10px;background:rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-robot" style="color:#a78bfa;font-size:14px;"></i>
          </div>
          <div>
            <p style="color:white;font-weight:800;font-size:13px;">AI Grading Complete</p>
            <p style="color:#9ca3af;font-size:10px;">${model}</p>
          </div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
          <span style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#34d399;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:700;">
            ${totalAI} / ${totalPoss} marks
          </span>
          <span style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3);color:#c4b5fd;font-size:11px;padding:2px 10px;border-radius:20px;font-weight:700;">
            ${pct}%
          </span>
          <span style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);color:#818cf8;font-size:10px;padding:2px 8px;border-radius:20px;">
            ${graded_at}
          </span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        ${results.map((r,i) => `
          <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 10px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
              <span style="color:#6b7280;font-size:10px;">Q${(r.question_index||i)+1}</span>
              <span style="color:${r.score >= r.marks*0.7 ? '#10b981' : r.score >= r.marks*0.4 ? '#f59e0b' : '#ef4444'};font-weight:800;font-size:12px;">
                ${r.score}/${r.marks}
              </span>
            </div>
            <div style="font-size:10px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.feedback)}">
              ${esc(r.feedback||'—')}
            </div>
            <div style="margin-top:4px;">
              <span style="font-size:9px;padding:1px 6px;border-radius:8px;
                background:${r.confidence==='high'?'rgba(16,185,129,0.15)':r.confidence==='medium'?'rgba(245,158,11,0.15)':'rgba(239,68,68,0.15)'};
                color:${r.confidence==='high'?'#34d399':r.confidence==='medium'?'#fbbf24':'#f87171'};
                border:1px solid ${r.confidence==='high'?'rgba(16,185,129,0.3)':r.confidence==='medium'?'rgba(245,158,11,0.3)':'rgba(239,68,68,0.3)'};">
                ${r.confidence||'—'} confidence
              </span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── RENDER Q&A LIST ───────────────────────────────────────
function renderQAList(answers, aiData) {
  const qaList = document.getElementById('qa-list');
  if (!allQuestions.length) {
    qaList.innerHTML = `
      <div class="glass rounded-xl p-8 text-center text-gray-500 text-sm">
        <i class="fas fa-question-circle text-2xl mb-2 block"></i>
        No questions found for this exam.
      </div>`;
    return;
  }

  // Build AI results map by question_id
  const aiMap = {};
  if (aiData?.results) {
    aiData.results.forEach(r => {
      aiMap[r.question_id] = r;
    });
  }

  qaList.innerHTML = allQuestions.map((q, i) => {
    const qid        = q._id;
    const studentAns = answers[qid];
    const modelAns   = q.model_answer || q.correct_option || null;
    const isCorrect  = q.type==='mcq' && studentAns && modelAns && studentAns===modelAns;
    const isWrong    = q.type==='mcq' && studentAns && modelAns && studentAns!==modelAns;
    const notAnswered= !studentAns || studentAns==='';
    const aiResult   = aiMap[qid] || null;

    const borderCls = isCorrect ? 'border-emerald-600/30'
                    : isWrong   ? 'border-red-600/30'
                    :             'border-gray-700/30';

    return `
      <div class="glass rounded-2xl p-5 border ${borderCls}" id="qblock-${qid}">

        <!-- Question header -->
        <div class="flex gap-3 mb-3">
          <div class="flex items-start gap-2 flex-shrink-0">
            <span class="text-xs font-bold px-2 py-0.5 rounded-full
              ${q.type==='mcq'
                ? 'bg-indigo-600/30 text-indigo-300 border border-indigo-600/20'
                : 'bg-purple-600/30 text-purple-300 border border-purple-600/20'}">
              Q${i+1}
            </span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-gray-700/60 text-gray-400 border border-gray-600/30 uppercase">
              ${q.type}
            </span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-yellow-900/30 text-yellow-400 border border-yellow-700/30">
              ${q.marks} mark${q.marks>1?'s':''}
            </span>
          </div>
          <p class="text-gray-100 text-sm leading-relaxed flex-1">${esc(q.text)}</p>
        </div>

        <!-- MCQ options -->
        ${q.type==='mcq' && q.options?.length ? `
        <div class="grid grid-cols-2 gap-2 mb-3">
          ${q.options.map(opt=>`
            <div class="px-3 py-2 rounded-lg text-xs border
              ${opt===modelAns ? 'bg-emerald-900/30 border-emerald-600/40 text-emerald-300'
              : opt===studentAns && opt!==modelAns ? 'bg-red-900/30 border-red-600/40 text-red-300'
              : 'bg-gray-800/40 border-gray-700/30 text-gray-400'}">
              ${opt===modelAns ? '✓ ' : opt===studentAns&&opt!==modelAns ? '✗ ' : ''}${esc(opt)}
            </div>`).join('')}
        </div>` : ''}

        <!-- Answer comparison -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs mb-3">
          <div class="rounded-xl p-3 ${
            isCorrect   ? 'bg-emerald-900/20 border border-emerald-700/30'
          : isWrong     ? 'bg-red-900/20 border border-red-700/30'
          : notAnswered ? 'bg-gray-800/30 border border-gray-700/20'
          :               'bg-blue-900/20 border border-blue-700/30'}">
            <p class="text-gray-400 uppercase tracking-wide text-[10px] mb-1.5 flex items-center gap-1">
              <i class="fas fa-user"></i> Student Answer
            </p>
            <p class="${isCorrect?'text-emerald-400':isWrong?'text-red-400':notAnswered?'text-gray-500 italic':'text-blue-300'}">
              ${notAnswered ? 'Not answered' : esc(studentAns)}
              ${isCorrect?' ✅':isWrong?' ❌':''}
            </p>
          </div>
          <div class="rounded-xl p-3 bg-emerald-900/10 border border-emerald-700/20">
            <p class="text-gray-400 uppercase tracking-wide text-[10px] mb-1.5 flex items-center gap-1">
              <i class="fas fa-key"></i> Model Answer
            </p>
            <p class="${modelAns?'text-emerald-300':'text-gray-500 italic'}">
              ${modelAns ? esc(modelAns) : 'Not set'}
            </p>
          </div>
        </div>

        <!-- ★ AI GRADING RESULT (subjective only) ★ -->
        ${q.type==='subjective' ? `
        <div id="ai-result-${qid}">
          ${aiResult ? buildAIResultBox(aiResult) : `
          <div style="background:rgba(139,92,246,0.05);border:1px dashed rgba(139,92,246,0.25);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;">
            <i class="fas fa-robot" style="color:#6b7280;font-size:12px;"></i>
            <span style="color:#6b7280;font-size:11px;">
              Click <strong style="color:#a78bfa;">Grade with AI</strong> to auto-evaluate this answer
            </span>
          </div>`}
        </div>` : ''}

      </div>`;
  }).join('');
}

// ── AI RESULT BOX per question ────────────────────────────
function buildAIResultBox(r) {
  const pct       = r.marks ? Math.round((r.score/r.marks)*100) : 0;
  const barColor  = pct>=70?'#10b981':pct>=40?'#f59e0b':'#ef4444';
  const confColor = r.confidence==='high'?'#34d399':r.confidence==='medium'?'#fbbf24':'#f87171';
  const confBg    = r.confidence==='high'?'rgba(16,185,129,0.1)':r.confidence==='medium'?'rgba(245,158,11,0.1)':'rgba(239,68,68,0.1)';

  return `
    <div style="background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.25);border-radius:12px;padding:12px 14px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <i class="fas fa-robot" style="color:#a78bfa;font-size:13px;"></i>
        <span style="color:#c4b5fd;font-size:11px;font-weight:700;">AI Evaluation</span>

        <!-- Score -->
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
          <div style="width:36px;height:36px;${`background:conic-gradient(${barColor} ${pct*3.6}deg,rgba(255,255,255,0.05) 0deg)`};border-radius:50%;display:flex;align-items:center;justify-content:center;">
            <div style="width:26px;height:26px;border-radius:50%;background:#0a0a1f;display:flex;align-items:center;justify-content:center;">
              <span style="color:white;font-size:9px;font-weight:900;">${r.score}</span>
            </div>
          </div>
          <div>
            <div style="color:white;font-weight:800;font-size:13px;">${r.score}/${r.marks}</div>
            <div style="color:#6b7280;font-size:9px;">${pct}%</div>
          </div>
          <span style="font-size:9px;padding:2px 7px;border-radius:8px;background:${confBg};color:${confColor};border:1px solid ${confColor}30;">
            ${r.confidence} confidence
          </span>
        </div>
      </div>

      <!-- Score bar -->
      <div style="width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:4px;margin-bottom:8px;">
        <div style="width:${pct}%;height:4px;background:${barColor};border-radius:4px;transition:width 0.5s;"></div>
      </div>

      <!-- Feedback -->
      <p style="color:#d1d5db;font-size:11px;line-height:1.6;margin-bottom:6px;">
        <i class="fas fa-comment-dots" style="color:#a78bfa;margin-right:5px;"></i>
        ${esc(r.feedback||'—')}
      </p>

      <!-- Key points -->
      ${r.key_points?.length ? `
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">
        ${r.key_points.map(kp=>`
          <span style="font-size:9px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);color:#c4b5fd;padding:2px 7px;border-radius:8px;">
            ${esc(kp)}
          </span>`).join('')}
      </div>` : ''}
    </div>`;
}

// ── ★ RUN AI GRADING ★ ───────────────────────────────────
async function runAIGrading() {
  if (!currentUid) {
    toast('Select a student first', 'warning'); return;
  }

  const subjCount = allQuestions.filter(
    q => q.type === 'subjective').length;
  if (subjCount === 0) {
    toast('No subjective questions to grade', 'info');
    return;
  }

  // Show loader
  const loader = document.getElementById('ai-grading-loader');
  document.getElementById('ai-loader-name').textContent =
    currentName;
  loader.classList.remove('hidden');

  // Disable button
  const btn  = document.getElementById('ai-grade-btn');
  const icon = document.getElementById('ai-btn-icon');
  const text = document.getElementById('ai-btn-text');
  if (btn)  btn.disabled  = true;
  if (icon) icon.className = 'fas fa-spinner fa-spin';
  if (text) text.textContent = 'AI Grading…';

  try {
    const r = await fetch(
      `/api/exams/${EXAM_ID}/ai-grade/${currentUid}`,
      { method:'POST', credentials:'same-origin' }
    );
    const d = await r.json();

    if (!r.ok) {
      toast(d.error || 'AI grading failed', 'error');
      return;
    }

    // Cache + show AI badge in sidebar
    aiResultsCache[currentUid] = d;
    const badge = document.getElementById(
      `ai-badge-${currentUid}`);
    if (badge) badge.style.display = 'block';

    toast(
      `AI graded ${d.questions_graded} questions! ` +
      `Total: ${d.total_ai_marks} marks`,
      'success'
    );

    // Reload panel with AI results
    const [marksRes] = await Promise.all([
      apiGet(`/api/exams/${EXAM_ID}/marks/${currentUid}`)
    ]);
    const marks   = marksRes.data || {};
    const sub     = allSubs.find(s => s.user_id === currentUid);
    const answers = sub?.answers || {};

    // Update AI summary
    const summaryEl = document.getElementById('ai-summary');
    if (summaryEl) {
      summaryEl.innerHTML = buildAISummary(d);
      summaryEl.classList.remove('hidden');
    }

    // Update stats
    const aiScoreEl = document.querySelector(
      '#answer-panel .text-purple-400:last-child');

    // Update each subjective question's AI result
    if (d.results) {
      d.results.forEach(r => {
        const el = document.getElementById(
          `ai-result-${r.question_id}`);
        if (el) el.innerHTML = buildAIResultBox(r);
      });
    }

    // Update header badges
    const manualDisp = document.getElementById(
      'manual-display');
    if (manualDisp) {
      // Refresh header — re-render
      const nameH = document.querySelector(
        '#answer-panel h2');
      if (nameH) {
        const roll = sub?.roll_number || '';
        renderAnswerPanel(
          currentUid, currentName, roll,
          { ...marks,
            ai_subjective_marks: d.total_ai_marks },
          answers, d
        );
      }
    }

  } catch(e) {
    toast('Error: ' + e.message, 'error');
    console.error('[AI Grade]', e);
  } finally {
    loader.classList.add('hidden');
    if (btn)  btn.disabled  = false;
    if (icon) icon.className = 'fas fa-robot';
    if (text) text.textContent = 'Re-Grade with AI';
  }
}

// ── SAVE MARKS ────────────────────────────────────────────
async function saveMarks() {
  if (!currentUid) {
    toast('Select a student first', 'warning'); return;
  }
  const manual_marks = parseInt(
    document.getElementById('manual-marks')?.value) || 0;
  const remarks = document.getElementById(
    'remarks')?.value || '';

  const {ok, data} = await apiPut(
    `/api/exams/${EXAM_ID}/marks/${currentUid}`,
    { manual_marks, remarks }
  );

  if (ok) {
    toast(data.message || 'Marks saved!', 'success');
    const md = document.getElementById('manual-display');
    if (md) md.textContent = manual_marks;
  } else {
    toast(data.error || 'Failed to save marks', 'error');
  }
}

// ── UTIL ──────────────────────────────────────────────────
function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

init();
</script>
